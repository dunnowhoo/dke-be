version: '3.8'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  db:
    image: postgres:15
    container_name: dke-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odoo}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ============================================================
  # Odoo 17 Web Server
  # ============================================================
  odoo:
    image: odoo:17.0
    container_name: dke-odoo
    depends_on:
      - db
    env_file: .env
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "8072:8072"
    volumes:
      - ./:/mnt/extra-addons/dke_crm
      - odoo-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:-odoo}
    restart: unless-stopped

volumes:
  pgdata:
  odoo-data:
