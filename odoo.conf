[options]
; Database connection (overridden by Docker environment variables)
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; Always use the CRM_ENTERPRISE database — ensures module routes are mounted on every request
db_filter = ^CRM_ENTERPRISE$

; Paths
addons_path = /mnt/extra-addons,/mnt/enterprise-addons
data_dir = /var/lib/odoo

; Server
http_port = 8069

; Master password untuk database management via web UI
; PENTING: Ganti di production! Nilai default hanya untuk development.
admin_passwd = admin

; Logging
log_level = info

; Performance
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

