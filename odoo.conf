[options]
; Database connection (overridden by Docker environment variables)
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = dke_crm

; Always use the dke_crm database — ensures module routes are mounted on every request
db_filter = ^dke_crm$

; Paths
addons_path = /mnt/enterprise-addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; Database
db_name = CRM_ENTERPRISE

; Server
http_port = 8069

; Master password untuk database management via web UI
; PENTING: Ganti di production! Nilai default hanya untuk development.
admin_passwd = admin

; Logging
log_level = info

; Performance
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

